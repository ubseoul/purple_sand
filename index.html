<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purple Sand</title>
  <meta name="description" content="A compact image-first curated scroll for reputable news, anime, League of Legends, Al Jazeera, NHK, and local weather." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="scroll-app">
    <section class="compact-topbar" aria-label="Purple Sand controls">
      <div class="compact-brand">
        <div class="logo">PS</div>
        <div>
          <h1>Purple Sand</h1>
          <p id="postCount">Loading feed...</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="mode-chip active" data-mode="balanced">Balanced</button>
        <button class="mode-chip" data-mode="focus">Focus</button>
        <button class="mode-chip" data-mode="culture">Culture</button>
        <button class="mode-chip" data-mode="night">Night</button>
        <button id="refreshButton" class="refresh-button">Refresh</button>
        <button id="weatherButton" class="weather-pill">Weather</button>
      </div>
    </section>

    <section class="source-strip" id="sourceStrip" aria-label="Live source status"></section>
    <section id="feed" class="feed infinite-feed" aria-live="polite"></section>
  </main>

  <template id="cardTemplate">
    <article class="card article-card">
      <div class="media-wrap">
        <img class="post-image" alt="" loading="lazy" />
      </div>
      <div class="card-body">
        <div class="card-topline">
          <span class="tag"></span>
          <span class="score"></span>
        </div>
        <h2></h2>
        <p class="summary"></p>
        <div class="meta"></div>
        <p class="why"></p>
        <a class="read-link" target="_blank" rel="noopener noreferrer">Open story</a>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
